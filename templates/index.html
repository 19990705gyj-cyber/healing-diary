{% extends "base.html" %}
{% block title %}今日复盘 · 疗愈日记本{% endblock %}

{% block extra_css %}
<style>
  .date-header {
    text-align: center;
    margin-bottom: 28px;
  }
  .date-header .date-big {
    font-size: 2rem;
    font-weight: 700;
    color: var(--text-primary);
  }
  .date-header .date-sub {
    font-size: 0.9rem;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .date-header .date-quote {
    margin-top: 12px;
    padding: 12px 20px;
    background: linear-gradient(135deg, #FFF0ED, #F0EBFA);
    border-radius: 50px;
    font-size: 0.88rem;
    color: var(--text-secondary);
    display: inline-block;
  }

  /* 字段卡片 */
  .field-card {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px 28px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    transition: box-shadow 0.2s;
  }
  .field-card:hover { box-shadow: var(--shadow-hover); }
  .field-label {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .field-label .req { color: var(--primary-dark); font-size: 0.8rem; }

  /* ── 摸鱼环节图片上传区域 ── */
  .fish-section {
    background: linear-gradient(135deg, #E8F5EE, #E3F2FD);
    border: 2px dashed #B7E1CD;
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 16px;
    text-align: center;
    transition: all 0.3s;
  }
  .fish-section.drag-over {
    border-color: var(--primary);
    background: linear-gradient(135deg, #FFF0ED, #FFE8E4);
  }
  .fish-upload-zone {
    cursor: pointer;
    padding: 20px;
  }
  .fish-upload-zone .icon { font-size: 3rem; margin-bottom: 10px; }
  .fish-upload-zone .hint { font-size: 0.88rem; color: var(--text-secondary); }
  .fish-upload-zone .hint strong { color: var(--primary-dark); }
  .fish-image-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-top: 16px; }
  .fish-image-item {
    position: relative;
    border-radius: var(--radius-sm);
    overflow: hidden;
    border: 2px solid var(--border);
    transition: all 0.2s;
    background: white;
  }
  .fish-image-item:hover { border-color: var(--primary); box-shadow: var(--shadow); }
  .fish-image-item img {
    width: 100%; height: 140px;
    object-fit: cover;
    display: block;
  }
  .fish-image-item .del-btn {
    position: absolute;
    top: 6px; right: 6px;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    color: white;
    border: none;
    cursor: pointer;
    font-size: 0.85rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .fish-image-item .del-btn:hover { background: #E07A5F; }
  .fish-image-item .img-caption {
    padding: 8px 10px;
    font-size: 0.78rem;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .fish-caption-input {
    width: 100%;
    margin-top: 12px;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 0.88rem;
    background: white;
    color: var(--text-primary);
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .fish-caption-input:focus { border-color: var(--primary); }
  .fish-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #FFF0ED;
    color: var(--primary-dark);
    padding: 4px 10px;
    border-radius: 50px;
    font-size: 0.76rem;
    font-weight: 600;
    margin-top: 8px;
  }
  .field-card.hidden-by-fish { display: none; }

  /* 底部操作栏 */
  .action-bar {
    background: white;
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    position: sticky;
    bottom: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    z-index: 50;
  }
  .save-status {
    font-size: 0.82rem;
    color: var(--text-secondary);
  }
  .save-status.saved { color: #52B788; }

  /* 分享弹窗 */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }
  .modal {
    background: white;
    border-radius: var(--radius);
    padding: 32px;
    max-width: 400px;
    width: 90%;
    transform: scale(0.95);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: scale(1); }
  .modal-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 20px;
  }
  .share-options { display: flex; flex-direction: column; gap: 10px; }
  .share-option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.2s;
  }
  .share-option:hover { border-color: var(--primary); background: #FFF7F5; }
  .share-option .icon { font-size: 1.4rem; }
  .share-option .info .name { font-size: 0.9rem; font-weight: 600; }
  .share-option .info .desc { font-size: 0.78rem; color: var(--text-secondary); }
  .share-link-box {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .share-link-box input {
    flex: 1;
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 0.82rem;
    background: var(--bg-warm);
    outline: none;
  }
</style>
{% endblock %}

{% block content %}
<div class="container">
  <!-- 日期头部 -->
  <div class="date-header">
    <div class="date-big" id="dateDisplay"></div>
    <div class="date-sub" id="dateSubDisplay"></div>
    <div class="date-quote" id="dailyQuote">🌿 今天，好好感受自己</div>
    <!-- 日期导航：可切换编辑历史日期 -->
    <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px">
      <button onclick="goDate(-1)" style="background:none;border:none;font-size:1.2rem;cursor:pointer;padding:4px 8px;border-radius:6px;color:#9B8579" title="前一天">◀</button>
      <span id="dateNavLabel" style="font-size:.82rem;color:#9B8579;font-weight:500;min-width:100px;text-align:center"></span>
      <button onclick="goDate(1)" style="background:none;border:none;font-size:1.2rem;cursor:pointer;padding:4px 8px;border-radius:6px;color:#9B8579" title="后一天">▶</button>
      <button onclick="goDate(0)" style="background:none;border:none;font-size:.82rem;cursor:pointer;padding:4px 12px;border-radius:20px;border:1px solid #E8D5C8;color:#9B8579;font-weight:500" title="回到今天">今天</button>
    </div>
  </div>

  <!-- 表单区域 -->
  <div id="formArea">
    <div class="loading"><div class="spinner"></div> 加载复盘框架…</div>
  </div>

  <!-- 今日复盘已完成提示（顶部卡片） -->
  <div id="completedBanner" style="display:none" class="card" 
       style="background: linear-gradient(135deg, #F0FAFA, #F0EBFA); text-align:center; padding: 20px;">
  </div>
</div>

<!-- 底部操作栏 -->
<div class="action-bar" id="actionBar" style="display:none">
  <div class="save-status" id="saveStatus">还未保存</div>
  <div style="display:flex;gap:10px">
    <button class="btn btn-ghost btn-sm" onclick="openShareModal()" id="shareBtn" style="display:none">
      🔗 分享
    </button>
    <button class="btn btn-primary" onclick="saveReview()" id="saveBtn">
      💾 保存复盘
    </button>
  </div>
</div>

<!-- 分享弹窗 -->
<div class="modal-overlay" id="shareModal" onclick="closeShareModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">🔗 分享今日复盘</div>
    <div class="share-options">
      <div class="share-option" onclick="shareLink()">
        <div class="icon">🔗</div>
        <div class="info">
          <div class="name">生成分享链接</div>
          <div class="desc">任何人打开链接即可查看</div>
        </div>
      </div>
      <div class="share-option" onclick="shareImage()">
        <div class="icon">🖼️</div>
        <div class="info">
          <div class="name">导出为图片</div>
          <div class="desc">保存今日复盘为 PNG</div>
        </div>
      </div>
      <div class="share-option" onclick="sharePDF()">
        <div class="icon">📄</div>
        <div class="info">
          <div class="name">导出为 PDF</div>
          <div class="desc">下载 PDF 文件</div>
        </div>
      </div>
      <div class="share-option" onclick="shareCopyText()">
        <div class="icon">📋</div>
        <div class="info">
          <div class="name">复制为文本</div>
          <div class="desc">复制到剪贴板，粘贴到微信/钉钉</div>
        </div>
      </div>
    </div>
    <div id="shareLinkArea" style="display:none">
      <div class="share-link-box">
        <input type="text" id="shareLinkInput" readonly>
        <button class="btn btn-primary btn-sm" onclick="copyShareLink()">复制</button>
      </div>
    </div>
    <div style="margin-top:16px;text-align:right">
      <button class="btn btn-ghost btn-sm" onclick="closeShareModal()">关闭</button>
    </div>
  </div>
</div>

<!-- 隐藏的分享导出卡片（纯排版，用于截图导出） -->
<div id="shareExportCard" style="position:fixed;left:-9999px;top:0;width:600px;background:white;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif"></div>

{% endblock %}

{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
let fields = [];
let todayReview = null;
let formValues = {};
let todayStr = '';

const QUOTES = [
  '🌿 今天，好好感受自己',
  '☀️ 每一天都是新的开始',
  '💛 你已经很棒了',
  '🌱 慢慢来，比较快',
  '🌸 允许自己不完美',
  '🍵 深呼吸，一切都好',
  '✨ 感谢今天遇见的每一刻',
];

const WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六'];
const FIELD_ICONS = {text:'✏️', textarea:'📝', rating:'⭐', mood_picker:'💛', single_choice:'🔘', multi_choice:'☑️', slider:'🎚️'};

let reviewDate = null; // 当前编辑的日期 (YYYY-MM-DD)，null=今天

async function init() {
  const now = new Date();
  todayStr = now.toISOString().split('T')[0];
  // 检查 URL 参数中是否有指定日期
  const params = new URLSearchParams(location.search);
  const dateParam = params.get('date');
  if (dateParam && /^\d{4}-\d{2}-\d{2}$/.test(dateParam)) {
    reviewDate = dateParam;
  } else {
    reviewDate = null;
  }
  await loadDate();
}

async function loadDate() {
  const d = reviewDate ? new Date(reviewDate + 'T00:00:00') : new Date();
  const dateStr = reviewDate || todayStr;
  const isToday = !reviewDate || reviewDate === todayStr;
  
  const dateEl = document.getElementById('dateDisplay');
  const subEl = document.getElementById('dateSubDisplay');
  const quoteEl = document.getElementById('dailyQuote');
  const navLabel = document.getElementById('dateNavLabel');
  
  dateEl.textContent = `${d.getMonth()+1}月${d.getDate()}日`;
  subEl.textContent = `${d.getFullYear()}年 · ${WEEKDAYS[d.getDay()]}`;
  quoteEl.textContent = QUOTES[d.getDay()];
  navLabel.textContent = isToday ? '📌 今天' : `📅 ${d.getMonth()+1}/${d.getDate()}`;

  try {
    [fields, todayReview] = await Promise.all([
      apiFetch('/api/fields'),
      apiFetch(`/api/reviews/${dateStr}`)
    ]);
    renderForm();
    if (formValues['fish_mode'] && formValues['fish_mode'].includes('🎣')) {
      toggleFishMode();
    }
  } catch(e) {
    document.getElementById('formArea').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>加载失败，请刷新重试</p></div>`;
  }
}

function goDate(offset) {
  if (offset === 0) {
    reviewDate = null;
  } else {
    const d = reviewDate ? new Date(reviewDate + 'T00:00:00') : new Date();
    d.setDate(d.getDate() + offset);
    // 不能超过今天
    const today = new Date();
    today.setHours(23,59,59,999);
    if (d > today) return;
    reviewDate = d.toISOString().split('T')[0];
    if (reviewDate === todayStr) reviewDate = null;
  }
  // 更新 URL
  const url = new URL(location.href);
  if (reviewDate) url.searchParams.set('date', reviewDate);
  else url.searchParams.delete('date');
  history.replaceState(null, '', url.toString());
  loadDate();
}

function renderForm() {
  if (!fields.length) {
    document.getElementById('formArea').innerHTML = `
      <div class="empty-state">
        <div class="icon">📝</div>
        <p>管理员还未设置复盘字段</p>
        <p style="font-size:.8rem">请联系管理员配置复盘框架</p>
      </div>`;
    return;
  }

  const existingContent = todayReview ? todayReview.content : {};
  formValues = {...existingContent};

  let html = '';
  let fishModeIndex = -1;
  fields.forEach((f, idx) => {
    if (f.field_key === 'fish_mode') fishModeIndex = idx;
    const extraClass = (fishModeIndex >= 0 && idx > fishModeIndex) ? ' hidden-by-fish' : '';
    html += `<div class="field-card${extraClass}" id="field-card-${f.field_key}">`;
    html += `<div class="field-label">`;
    html += getFieldIcon(f.field_type) + ' ' + escHtml(f.label);
    if (f.is_required) html += ` <span class="req">必填</span>`;
    html += `</div>`;
    html += renderFieldInput(f, existingContent[f.field_key]);
    html += `</div>`;
  });

  document.getElementById('formArea').innerHTML = html;
  document.getElementById('actionBar').style.display = 'flex';

  if (todayReview) {
    document.getElementById('saveStatus').textContent = '已保存 ✓';
    document.getElementById('saveStatus').className = 'save-status saved';
    document.getElementById('saveBtn').textContent = '✅ 更新复盘';
    document.getElementById('shareBtn').style.display = 'flex';
  }

  // 绑定事件
  bindFieldEvents();
}

function getFieldIcon(type) {
  const icons = {text:'✏️', textarea:'📝', rating:'⭐', mood_picker:'💛', single_choice:'🔘', multi_choice:'☑️', slider:'🎚️'};
  return icons[type] || '📌';
}

function renderFieldInput(field, currentValue) {
  const key = field.field_key;
  switch(field.field_type) {
    case 'mood_picker': {
      const opts = field.options || [];
      let html = '<div class="mood-picker">';
      opts.forEach(opt => {
        const sel = currentValue === opt ? 'selected' : '';
        html += `<div class="mood-option ${sel}" data-key="${key}" data-val="${escHtml(opt)}" onclick="selectMood(this)">${escHtml(opt)}</div>`;
      });
      html += '</div>';
      return html;
    }
    case 'rating': {
      const max = 10;
      let html = '<div class="rating-row"><div class="rating-dots">';
      for (let i=1; i<=max; i++) {
        const active = currentValue == i ? 'active' : '';
        html += `<div class="rating-dot ${active}" data-key="${key}" data-val="${i}" onclick="selectRating(this)">${i}</div>`;
      }
      html += `</div><div class="rating-label" id="rating-label-${key}">${currentValue ? currentValue+'/10' : ''}</div></div>`;
      return html;
    }
    case 'slider': {
      const val = currentValue || 5;
      return `
        <input type="range" min="1" max="10" value="${val}" 
               data-key="${key}" oninput="updateSlider(this)"
               id="slider-${key}">
        <div class="slider-labels">
          <span>很低 1</span>
          <span id="slider-val-${key}" style="color:var(--primary-dark);font-weight:700">${val}</span>
          <span>很高 10</span>
        </div>`;
    }
    case 'single_choice': {
      const opts = field.options || [];
      let html = '<div class="choice-list">';
      opts.forEach(opt => {
        const sel = currentValue === opt ? 'selected' : '';
        html += `<div class="choice-item ${sel}" data-key="${key}" data-val="${escHtml(opt)}" data-multi="false" onclick="selectChoice(this)">${escHtml(opt)}</div>`;
      });
      html += '</div>';
      return html;
    }
    case 'multi_choice': {
      const opts = field.options || [];
      const selected = Array.isArray(currentValue) ? currentValue : [];
      let html = '<div class="choice-list">';
      opts.forEach(opt => {
        const sel = selected.includes(opt) ? 'selected' : '';
        html += `<div class="choice-item ${sel}" data-key="${key}" data-val="${escHtml(opt)}" data-multi="true" onclick="selectChoice(this)">${escHtml(opt)}</div>`;
      });
      html += '</div>';
      return html;
    }
    case 'textarea': {
      return `<textarea class="form-textarea" rows="4" data-key="${key}" 
                placeholder="${escHtml(field.placeholder||'')}"
                oninput="updateTextValue(this)">${escHtml(currentValue||'')}</textarea>`;
    }
    case 'text':
    default: {
      return `<input type="text" class="form-input" data-key="${key}"
               placeholder="${escHtml(field.placeholder||'')}"
               value="${escHtml(currentValue||'')}"
               oninput="updateTextValue(this)">`;
    }
  }
}

function bindFieldEvents() {
  // slider 初始化
  document.querySelectorAll('input[type="range"]').forEach(slider => {
    const key = slider.dataset.key;
    if (!formValues[key]) formValues[key] = parseInt(slider.value);
  });
}

function selectMood(el) {
  const key = el.dataset.key;
  document.querySelectorAll(`.mood-option[data-key="${key}"]`).forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  formValues[key] = el.dataset.val;
  markDirty();
}

function selectRating(el) {
  const key = el.dataset.key;
  const val = parseInt(el.dataset.val);
  document.querySelectorAll(`.rating-dot[data-key="${key}"]`).forEach((e, i) => {
    e.classList.toggle('active', parseInt(e.dataset.val) <= val);
  });
  document.getElementById(`rating-label-${key}`).textContent = val + '/10';
  formValues[key] = val;
  markDirty();
}

function updateSlider(el) {
  const key = el.dataset.key;
  const val = el.value;
  document.getElementById(`slider-val-${key}`).textContent = val;
  formValues[key] = parseInt(val);
  markDirty();
}

function selectChoice(el) {
  const key = el.dataset.key;
  const multi = el.dataset.multi === 'true';
  if (multi) {
    el.classList.toggle('selected');
    const selected = [...document.querySelectorAll(`.choice-item[data-key="${key}"].selected`)]
      .map(e => e.dataset.val);
    formValues[key] = selected;
  } else {
    document.querySelectorAll(`.choice-item[data-key="${key}"]`).forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    formValues[key] = el.dataset.val;
  }
  markDirty();

  // 摸鱼环节联动：选了「今天摸了」就显示摸鱼区域，隐藏其他字段
  if (key === 'fish_mode') {
    toggleFishMode();
  }
}

function toggleFishMode() {
  const fishVal = formValues['fish_mode'];
  const isFishMode = fishVal && fishVal.includes('🎣');

  // 显示/隐藏摸鱼上传区域
  const fishArea = document.getElementById('fishUploadArea');
  if (isFishMode) {
    if (!fishArea) {
      const areaHTML = `
        <div class="fish-section" id="fishUploadArea">
          <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px">
            <span style="font-size:1.5rem">🎣</span>
            <span style="font-weight:700;color:var(--text-primary)">摸鱼晒图</span>
            <span style="font-size:.78rem;color:var(--text-secondary)">| 上传今天的摸鱼证据吧</span>
          </div>
          <div class="fish-upload-zone" id="fishDropZone">
            <div class="icon">📸</div>
            <div class="hint">点击或拖拽上传图片 <strong>(必传)</strong></div>
            <div class="hint" style="font-size:.76rem;margin-top:4px">支持 PNG / JPG / GIF / WebP</div>
          </div>
          <input type="file" id="fishFileInput" accept="image/*" style="display:none" multiple>
          <input type="text" class="fish-caption-input" id="fishCaptionInput" placeholder="（选填）给这张图配一句话吧…">
          <div class="fish-image-list" id="fishImageList"></div>
          <div class="fish-badge" id="fishRequiredBadge" style="display:none">
            ⚠️ 请至少上传一张图片
          </div>
        </div>`;
      // 插入到 fish_mode 字段卡片后面
      const fishCard = document.getElementById('field-card-fish_mode');
      fishCard.insertAdjacentHTML('afterend', areaHTML);
      bindFishUploadEvents();
      loadFishImages();
    } else {
      fishArea.style.display = 'block';
    }

    // 隐藏其他字段卡片（除了摸鱼环节自己）
    document.querySelectorAll('.field-card').forEach(card => {
      if (card.id !== 'field-card-fish_mode' && !card.classList.contains('fish-section')) {
        card.classList.add('hidden-by-fish');
      }
    });
  } else {
    // 显示其他字段
    document.querySelectorAll('.field-card.hidden-by-fish').forEach(card => {
      card.classList.remove('hidden-by-fish');
    });
    // 隐藏摸鱼区域
    if (fishArea) fishArea.style.display = 'none';
  }
}

function bindFishUploadEvents() {
  const dropZone = document.getElementById('fishDropZone');
  const fileInput = document.getElementById('fishFileInput');
  if (!dropZone || !fileInput) return;

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.parentElement.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => { dropZone.parentElement.classList.remove('drag-over'); });
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.parentElement.classList.remove('drag-over');
    handleFishFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', () => handleFishFiles(fileInput.files));
}

async function handleFishFiles(files) {
  if (!files || files.length === 0) return;
  const caption = document.getElementById('fishCaptionInput')?.value || '';
  const dropZone = document.getElementById('fishDropZone');
  let successCount = 0;

  // 显示上传中状态
  if (dropZone) {
    dropZone.style.opacity = '0.6';
    dropZone.querySelector('.icon').textContent = '⏳';
    dropZone.querySelector('.hint').innerHTML = '上传中…';
  }

  for (const file of files) {
    const formData = new FormData();
    formData.append('image', file);
    formData.append('caption', caption);
    try {
      const dateStr = reviewDate || todayStr;
      const res = await fetch(`/api/reviews/${dateStr}/fish-images`, { method: 'POST', body: formData });
      if (res.ok) {
        successCount++;
      } else {
        const err = await res.json().catch(() => ({}));
        showToast(err.error || `「${file.name}」上传失败`, 'error');
      }
    } catch(e) {
      showToast('网络错误: ' + e.message, 'error');
    }
  }

  // 恢复上传区域状态
  if (dropZone) {
    dropZone.style.opacity = '1';
    dropZone.querySelector('.icon').textContent = '📸';
    dropZone.querySelector('.hint').innerHTML = '点击或拖拽上传图片 <strong>(必传)</strong>';
  }

  // 清空 file input
  const fileInput = document.getElementById('fishFileInput');
  if (fileInput) fileInput.value = '';

  // 清空 caption
  const captionInput = document.getElementById('fishCaptionInput');
  if (captionInput) captionInput.value = '';

  if (successCount > 0) {
    showToast(`已上传 ${successCount} 张图片 ✅`);
    await loadFishImages();
  }
}

async function loadFishImages() {
  const list = document.getElementById('fishImageList');
  const badge = document.getElementById('fishRequiredBadge');
  if (!list) return;
  try {
    const dateStr = reviewDate || todayStr;
    const images = await apiFetch(`/api/reviews/${dateStr}/fish-images`);
    if (images.length === 0) {
      list.innerHTML = '';
      if (badge) badge.style.display = 'block';
    } else {
      if (badge) badge.style.display = 'none';
      list.innerHTML = images.map(img => `
        <div class="fish-image-item">
          <img src="/api/fish-images/${img.filename}" alt="摸鱼图" loading="lazy">
          <button class="del-btn" onclick="deleteFishImage(${img.id})">×</button>
          ${img.caption ? `<div class="img-caption">${escHtml(img.caption)}</div>` : ''}
        </div>
      `).join('');
    }
  } catch(e) {
    console.error('加载图片失败', e);
  }
}

async function deleteFishImage(id) {
  try {
    const dateStr = reviewDate || todayStr;
    await apiFetch(`/api/reviews/${dateStr}/fish-images/${id}`, { method: 'DELETE' });
    loadFishImages();
  } catch(e) {
    showToast('删除失败', 'error');
  }
}

function updateTextValue(el) {
  formValues[el.dataset.key] = el.value;
  markDirty();
}

function markDirty() {
  document.getElementById('saveStatus').textContent = '有未保存的修改';
  document.getElementById('saveStatus').className = 'save-status';
}

async function saveReview() {
  // 摸鱼模式下：必须有图片
  const isFishMode = formValues['fish_mode'] && formValues['fish_mode'].includes('🎣');
  if (isFishMode) {
    try {
      const images = await apiFetch('/api/reviews/today/fish-images');
      if (images.length === 0) {
        showToast('摸鱼环节请至少上传一张图片 📸', 'error');
        return;
      }
    } catch(e) {
      showToast('请先上传图片', 'error');
      return;
    }
  }

  // 检查必填（摸鱼模式下跳过非摸鱼字段的必填检查）
  const missing = fields.filter(f => {
    if (f.field_key === 'fish_mode') return false;
    if (isFishMode && f.field_key !== 'fish_mode') return false; // 摸鱼模式跳过其他必填
    return f.is_required && !formValues[f.field_key];
  });
  if (!isFishMode && missing.length) {
    showToast(`请填写必填项：${missing.map(f=>f.label).join('、')}`, 'error');
    return;
  }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '保存中…';

  const dateStr = reviewDate || todayStr;
  const apiPath = reviewDate ? `/api/reviews/${dateStr}` : '/api/reviews/today';

  try {
    todayReview = await apiFetch(apiPath, {
      method: 'POST',
      body: JSON.stringify({content: formValues})
    });
    document.getElementById('saveStatus').textContent = '已保存 ✓';
    document.getElementById('saveStatus').className = 'save-status saved';
    document.getElementById('shareBtn').style.display = 'flex';
    btn.textContent = '✅ 更新复盘';
    showToast('复盘已保存 🌿', 'success');
  } catch(e) {
    showToast(e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

// ── 分享功能 ──
function openShareModal() {
  if (!todayReview) { showToast('请先保存复盘', 'error'); return; }
  document.getElementById('shareModal').classList.add('open');
  document.getElementById('shareLinkArea').style.display = 'none';
}
function closeShareModal(e) {
  if (!e || e.target === document.getElementById('shareModal')) {
    document.getElementById('shareModal').classList.remove('open');
  }
}

async function shareLink() {
  try {
    const dateStr = reviewDate || todayStr;
    const data = await apiFetch(`/api/reviews/${dateStr}/share`, {method:'POST'});
    const url = location.origin + data.share_url;
    document.getElementById('shareLinkInput').value = url;
    document.getElementById('shareLinkArea').style.display = 'block';
  } catch(e) {
    showToast(e.message, 'error');
  }
}

function copyShareLink() {
  const input = document.getElementById('shareLinkInput');
  navigator.clipboard.writeText(input.value).then(() => showToast('链接已复制 ✓', 'success'));
}

async function shareImage() {
  closeShareModal();
  showToast('正在生成图片…');
  try {
    await buildExportCard();
    const el = document.getElementById('shareExportCard');
    el.style.left = '0';
    el.style.zIndex = '-1';
    await new Promise(r => setTimeout(r, 400));
    
    const canvas = await html2canvas(el, {scale: 2, backgroundColor: '#FFFFFF', useCORS: true, allowTaint: true, logging: false});
    
    el.style.left = '-9999px';
    el.style.zIndex = '';
    
    const link = document.createElement('a');
    link.download = `疗愈复盘_${todayStr}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('图片已保存 🖼️', 'success');
  } catch(e) {
    document.getElementById('shareExportCard').style.left = '-9999px';
    showToast('生成失败：' + e.message, 'error');
  }
}

async function sharePDF() {
  closeShareModal();
  showToast('正在生成PDF…');
  try {
    await buildExportCard();
    const el = document.getElementById('shareExportCard');
    el.style.left = '0';
    el.style.zIndex = '-1';
    await new Promise(r => setTimeout(r, 400));
    
    const canvas = await html2canvas(el, {scale: 2, backgroundColor: '#FFFFFF', useCORS: true, allowTaint: true, logging: false});
    
    el.style.left = '-9999px';
    el.style.zIndex = '';
    
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({orientation: 'p', unit: 'px', format: [canvas.width/2, canvas.height/2]});
    pdf.addImage(imgData, 'PNG', 0, 0, canvas.width/2, canvas.height/2);
    pdf.save(`疗愈复盘_${todayStr}.pdf`);
    showToast('PDF已保存 📄', 'success');
  } catch(e) {
    document.getElementById('shareExportCard').style.left = '-9999px';
    showToast('生成失败：' + e.message, 'error');
  }
}

async function buildExportCard() {
  // 获取当前图片列表
  let fishImages = [];
  try {
    const dateStr = reviewDate || todayStr;
    fishImages = await apiFetch(`/api/reviews/${dateStr}/fish-images`);
  } catch(e) {}
  
  const isFishMode = formValues['fish_mode'] && formValues['fish_mode'].includes('🎣');
  const now = new Date();
  const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 周${WEEKDAYS[now.getDay()]}`;
  const avatarColor = '{{ current_user.avatar_color }}' || '#FFB5A7';
  const username = '{{ current_user.username }}';

  let bodyHTML = '';
  // 摸鱼模式下：只显示摸鱼图片，不渲染其他文字字段
  if (!isFishMode) {
    fields.forEach(f => {
      const val = formValues[f.field_key];
      if (val === undefined || val === null || val === '') return;
      if (Array.isArray(val) && val.length === 0) return;
      if (f.field_key === 'fish_mode') return;

      let valueHTML = '';
      let borderColor = '#FFB5A7';
      const icon = FIELD_ICONS[f.field_type] || '📌';

      if (f.field_type === 'rating') {
        const num = Number(val) || 0;
        valueHTML = '<div style="display:flex;gap:3px;align-items:center">';
        for (let i=1; i<=10; i++) valueHTML += `<span style="font-size:1.1rem;opacity:${i<=num?1:0.25}">★</span>`;
        valueHTML += `<span style="margin-left:8px;font-weight:700;font-size:1rem;color:#F59080">${num}/10</span></div>`;
        borderColor = '#FFD9A0';
      } else if (f.field_type === 'mood_picker') {
        valueHTML = `<div style="font-size:1.15rem;font-weight:600;color:#5C4A3A">${escHtml(val)}</div>`;
        borderColor = '#F7C5D0';
      } else if (f.field_type === 'single_choice') {
        valueHTML = `<span style="display:inline-block;padding:4px 12px;background:#FFF0ED;color:#F59080;border-radius:20px;font-size:.82rem;font-weight:500">${escHtml(val)}</span>`;
        borderColor = '#B7E1CD';
      } else if (f.field_type === 'multi_choice' && Array.isArray(val)) {
        valueHTML = val.map(v => `<span style="display:inline-block;padding:4px 12px;background:#FFF0ED;color:#F59080;border-radius:20px;font-size:.82rem;font-weight:500;margin-right:6px;margin-bottom:4px">${escHtml(v)}</span>`).join('');
      } else if (f.field_type === 'textarea') {
        valueHTML = `<div style="font-size:.92rem;color:#5C4A3A;line-height:1.8;white-space:pre-wrap">${escHtml(String(val))}</div>`;
        borderColor = '#C3B1E1';
      } else {
        valueHTML = `<div style="font-size:.92rem;color:#5C4A3A">${escHtml(Array.isArray(val)?val.join('、'):String(val))}</div>`;
      }

      bodyHTML += `
        <div style="margin-bottom:18px;padding:14px 16px;background:#FEFCFA;border-radius:12px;border-left:3px solid ${borderColor}">
          <div style="font-size:.72rem;font-weight:700;color:#9B8579;margin-bottom:7px;letter-spacing:.05em">${icon} ${escHtml(f.label)}</div>
          ${valueHTML}
        </div>`;
    });
  }

  // 摸鱼图片
  if (isFishMode && fishImages.length) {
    bodyHTML += `
      <div style="margin-bottom:18px;padding:14px 16px;background:#F5FAFD;border-radius:12px;border-left:3px solid #A8D8EA">
        <div style="font-size:.72rem;font-weight:700;color:#9B8579;margin-bottom:10px;letter-spacing:.05em">🎣 摸鱼晒图</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px">`;
    fishImages.forEach(img => {
      bodyHTML += `<div style="border-radius:8px;overflow:hidden;border:1px solid #F0E6DF;max-width:170px;background:white">
        <img src="/api/fish-images/${img.filename}" style="width:100%;display:block" crossorigin="anonymous">
        ${img.caption ? `<div style="padding:6px 10px;font-size:.7rem;color:#9B8579">${escHtml(img.caption)}</div>` : ''}
      </div>`;
    });
    bodyHTML += `</div></div>`;
  }

  if (!bodyHTML) {
    bodyHTML = '<div style="text-align:center;padding:40px 0;color:#9B8579;font-size:.9rem">📭 今天还没有记录内容</div>';
  }

  document.getElementById('shareExportCard').innerHTML = `
    <div style="padding:32px 28px 24px;text-align:center;background:linear-gradient(135deg,#FFF0ED,#F0EBFA);border-bottom:1px solid #F0E6DF">
      <div style="width:54px;height:54px;border-radius:50%;background:${avatarColor};display:inline-flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700;color:white;margin-bottom:10px">${username[0].toUpperCase()}</div>
      <div style="font-size:1.1rem;font-weight:700;color:#5C4A3A">${escHtml(username)} 的疗愈日记</div>
      <div style="font-size:.82rem;color:#9B8579;margin-top:5px">📅 ${dateStr}</div>
    </div>
    <div style="padding:24px 28px 12px">${bodyHTML}</div>
    <div style="background:#FFF9F5;padding:18px 28px;text-align:center;border-top:1px solid #F0E6DF">
      <div style="font-size:.78rem;color:#9B8579">✍️ 想要记录自己的疗愈日记？来加入我们</div>
      <div style="font-size:.7rem;color:#C5B5A5;margin-top:5px">🌿 疗愈日记本 · Healing Diary</div>
    </div>`;
}

function shareCopyText() {
  closeShareModal();
  const now = new Date();
  const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${WEEKDAYS[now.getDay()]}）`;
  let text = `🌿 疗愈复盘 · ${dateStr}\n\n`;
  
  fields.forEach(f => {
    const val = formValues[f.field_key];
    if (val !== undefined && val !== null && val !== '') {
      const displayVal = Array.isArray(val) ? val.join('、') : val;
      text += `${getFieldIcon(f.field_type)} ${f.label}：${displayVal}\n`;
    }
  });
  text += '\n— 来自疗愈日记本';
  
  navigator.clipboard.writeText(text).then(() => showToast('已复制到剪贴板 📋', 'success'));
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
{% endblock %}
