<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · 疗愈日记本</title>
  <style>
    :root {
      --bg-warm: #FFF9F5;
      --primary: #FFB5A7;
      --primary-dark: #F59080;
      --secondary: #B7E1CD;
      --accent: #C3B1E1;
      --text-primary: #5C4A3A;
      --text-secondary: #9B8579;
      --border: #F0E6DF;
      --radius: 16px;
      --radius-sm: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-warm);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .page-wrap {
      width: 100%;
      max-width: 420px;
    }
    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 10px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .logo-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .logo-sub {
      font-size: 0.88rem;
      color: var(--text-secondary);
      margin-top: 6px;
    }
    .card {
      background: white;
      border-radius: var(--radius);
      box-shadow: 0 8px 40px rgba(92, 74, 58, 0.1);
      padding: 36px 32px;
      border: 1px solid var(--border);
    }
    /* 标签切换 */
    .tabs {
      display: flex;
      background: var(--bg-warm);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab-btn {
      flex: 1;
      padding: 9px;
      text-align: center;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 7px;
      transition: all 0.2s;
      color: var(--text-secondary);
      border: none;
      background: none;
      font-family: inherit;
    }
    .tab-btn.active {
      background: white;
      color: var(--text-primary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    /* 表单 */
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 0.86rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 7px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      color: var(--text-primary);
      background: var(--bg-warm);
      font-family: inherit;
      transition: all 0.2s;
      outline: none;
    }
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(255, 181, 167, 0.2);
      background: white;
    }
    .btn-submit {
      width: 100%;
      padding: 13px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
      font-family: inherit;
    }
    .btn-submit:hover {
      background: var(--primary-dark);
      box-shadow: 0 4px 16px rgba(255, 181, 167, 0.5);
      transform: translateY(-1px);
    }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .error-msg {
      background: #FFF0EE;
      border: 1px solid #FFCCC5;
      color: #C0392B;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.86rem;
      margin-bottom: 16px;
      display: none;
    }
    /* 底部引导 + 联系方式 */
    .footer-area {
      text-align: center;
      margin-top: 24px;
      font-size: 0.82rem;
      color: var(--text-secondary);
      line-height: 1.8;
    }
    .footer-area .switch-link {
      color: var(--primary-dark);
      cursor: pointer;
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .footer-area .switch-link:hover { color: #D4705F; }
    .contact-hint {
      margin-top: 8px;
      font-size: 0.76rem;
      color: #B5A595;
    }
    .contact-hint strong { color: #9B8579; }
    .toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--text-primary);
      color: white;
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
      z-index: 9999;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { background: #E07A5F; }
  </style>
</head>
<body>
<div class="page-wrap">
  <div class="logo-area">
    <span class="logo-icon">🌿</span>
    <div class="logo-title">疗愈日记本</div>
    <div class="logo-sub">每日复盘，与自己温柔相遇</div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">登录</button>
      <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">注册</button>
    </div>

    <div id="errorMsg" class="error-msg"></div>

    <!-- 登录表单（默认显示） -->
    <div id="loginForm">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="loginUsername" placeholder="请输入用户名">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="loginPassword" placeholder="请输入密码"
               onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn-submit" id="loginBtn" onclick="doLogin()">进入我的日记本 🌸</button>
    </div>

    <!-- 注册表单（默认隐藏） -->
    <div id="registerForm" style="display:none">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="regUsername" placeholder="给自己取一个名字" onblur="checkUsername()">
        <div id="usernameHint" style="font-size:.76rem;margin-top:4px;display:none"></div>
      </div>
      <div class="form-group">
        <label>密码 <span style="font-weight:400;color:var(--text-secondary)">（至少6位）</span></label>
        <input type="password" id="regPassword" placeholder="设置登录密码">
      </div>
      <div class="form-group">
        <label>确认密码</label>
        <input type="password" id="regPasswordConfirm" placeholder="再输入一次密码"
               onkeydown="if(event.key==='Enter')doRegister()">
      </div>
      <div style="background:#FFF9E6;border:1px solid #FFE8A0;border-radius:10px;padding:10px 14px;font-size:.82rem;color:#8B7300;margin-bottom:14px;line-height:1.5">
        ⚠️ 请务必记住你的密码，本站暂不提供密码找回功能。
      </div>
      <button class="btn-submit" id="registerBtn" onclick="doRegister()">开始我的疗愈之旅 🌱</button>
    </div>
  </div>

  <!-- 底部：注册引导 + 联系方式 -->
  <div class="footer-area" id="footerHint">
    <span>若未注册请<span class="switch-link" onclick="switchTab('register')">点此处进行注册</span></span>
    <div class="contact-hint">有问题请联系：<strong>LG-2ao</strong></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
let currentTab = 'login';

function switchTab(tab) {
  currentTab = tab;
  const isLogin = tab === 'login';
  document.getElementById('loginForm').style.display = isLogin ? 'block' : 'none';
  document.getElementById('registerForm').style.display = isLogin ? 'none' : 'block';
  document.getElementById('tabLogin').classList.toggle('active', isLogin);
  document.getElementById('tabRegister').classList.toggle('active', !isLogin);
  document.getElementById('errorMsg').style.display = 'none';
  // 切换底部提示文字
  const hint = document.getElementById('footerHint');
  if (isLogin) {
    hint.innerHTML = '<span>若未注册请<span class="switch-link" onclick="switchTab(\'register\')">点此处进行注册</span></span><div class="contact-hint">有问题请联系：<strong>LG-2ao</strong></div>';
  } else {
    hint.innerHTML = '<span>已有账号？<span class="switch-link" onclick="switchTab(\'login\')">点此登录</span></span><div class="contact-hint">有问题请联系：<strong>LG-2ao</strong></div>';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

async function doLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!username || !password) return showError('请填写用户名和密码');
  
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = '登录中…';
  
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password, remember: true})
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error || '登录失败'); return; }
    location.href = '/';
  } catch(e) {
    showError('网络错误，请稍后重试');
  } finally {
    btn.disabled = false; btn.textContent = '进入我的日记本 🌸';
  }
}

async function doRegister() {
  const username = document.getElementById('regUsername').value.trim();
  const password = document.getElementById('regPassword').value;
  const confirm = document.getElementById('regPasswordConfirm').value;
  
  if (!username || !password) return showError('请填写用户名和密码');
  if (password !== confirm) return showError('两次密码不一致');
  if (password.length < 6) return showError('密码不能少于6位');
  
  const btn = document.getElementById('registerBtn');
  btn.disabled = true; btn.textContent = '注册中…';
  
  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error || '注册失败'); return; }
    location.href = '/';
  } catch(e) {
    showError('网络错误，请稍后重试');
  } finally {
    btn.disabled = false; btn.textContent = '开始我的疗愈之旅 🌱';
  }
}

let checkTimer = null;
async function checkUsername() {
  const username = document.getElementById('regUsername').value.trim();
  const hint = document.getElementById('usernameHint');
  if (!username) { hint.style.display = 'none'; return; }
  if (username.length < 2) {
    hint.style.display = 'block'; hint.style.color = '#E07A5F';
    hint.textContent = '用户名至少2个字符';
    return;
  }
  clearTimeout(checkTimer);
  checkTimer = setTimeout(async () => {
    try {
      const res = await fetch(`/api/auth/check-username?username=${encodeURIComponent(username)}`);
      const data = await res.json();
      hint.style.display = 'block';
      if (data.exists) {
        hint.style.color = '#E07A5F';
        hint.textContent = '❌ 该用户名已被使用，请换一个';
      } else {
        hint.style.color = '#4CAF50';
        hint.textContent = '✅ 该用户名可用';
      }
    } catch(e) {
      hint.style.display = 'none';
    }
  }, 400);
}
</script>
</body>
</html>
